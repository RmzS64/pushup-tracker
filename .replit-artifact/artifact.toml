kind = "web"
previewPath = "/"
title = "Pushup Tracker"
version = "1.0.0"
id = "artifacts/pushup-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19598

[services.development]
run = "pnpm --filter @workspace/pushup-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pushup-tracker", "run", "build" ]
publicDir = "artifacts/pushup-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19598"
BASE_PATH = "/"
